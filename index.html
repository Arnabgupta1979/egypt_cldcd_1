<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASC Egypt — Central Administration for Seed Testing and Certification</title>

    <!-- 1. Load Tailwind CDN FIRST so the `tailwind` global exists -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. THEN extend the config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              emerald: {
                50:  '#eff6ee',
                100: '#def0dc',
                200: '#c4e3c2',
                300: '#a8d4a5',
                400: '#8db787',
                500: '#7caa7a',
                600: '#739d70',
                700: '#638C6D',
                800: '#4e7055',
                900: '#3d5b43',
                950: '#27392b',
              },
              amber: {
                50:  '#f7fce3',
                100: '#e7fbb4',
                200: '#d6f68f',
                300: '#bfe46d',
                400: '#a5d752',
                500: '#8cc23e',
                600: '#74ac30',
                700: '#5f8f24',
                800: '#4b6f1d',
                900: '#374f16',
              },
              orange: {
                400: '#e77a41',
                500: '#DF6D2D',
                600: '#C84C05',
                700: '#a44305',
              },
              red: {
                500: '#DF6D2D',
                600: '#C84C05',
                700: '#9f3d04',
              },
              parchment: {
                50:  '#f7fce8',
                100: '#e7fbb4',  /* page background */
                200: '#d8f58d',  /* raised surface  */
                300: '#c5e76f',  /* subtle dividers */
                400: '#a3d850',  
              },
              /* Deep ink for body copy — softer than pure black */
              ink: {
                700: '#2a2620',
                800: '#1c1915',
                900: '#100e0b',
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            boxShadow: {
              /* Used on cards — soft warm shadow, not the flat black SaaS shadow */
              card: '0 1px 2px rgba(76, 60, 30, 0.04), 0 8px 24px -8px rgba(76, 60, 30, 0.08)',
              'card-hover': '0 4px 8px rgba(76, 60, 30, 0.06), 0 16px 40px -12px rgba(76, 60, 30, 0.18)',
              /* Inset hairline used on primary buttons for the refreshed palette */
              minted: 'inset 0 0 0 1px rgba(231, 251, 180, 0.5), 0 4px 12px -2px rgba(54, 101, 107, 0.25)',
            },
            backgroundImage: {
              /* Subtle papyrus fibre — generated from layered linear-gradients,
                 no external image needed. Almost invisible but warms the page. */
              'papyrus':
                'repeating-linear-gradient(115deg, rgba(99,140,109,0.018) 0 2px, transparent 2px 7px),' +
                'repeating-linear-gradient(25deg,  rgba(223,109,45,0.022) 0 1px, transparent 1px 5px)',
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      html,
      body {
        font-family: 'Inter', system-ui, sans-serif;
        color: #3D3D3D;
      }

      html[dir="rtl"], body[dir="rtl"] {
        font-family: "Segoe UI", "Noto Kufi Arabic", "Noto Naskh Arabic", "Inter", system-ui, sans-serif;
      }

      body {
        background-color: #f7fce3;
        background-image:
          repeating-linear-gradient(115deg, rgba(99,140,109,0.05) 0 2px, transparent 2px 7px),
          repeating-linear-gradient(25deg,  rgba(223,109,45,0.06)  0 1px, transparent 1px 5px);
      }

      .text-slate-700, .text-slate-600, .text-slate-800, .text-slate-900 {
        color: #2D4A32 !important;
      }

      .text-slate-500 {
        color: #3D3D3D !important;
      }

      .text-slate-400 {
        color: rgba(61, 61, 61, 0.7) !important;
      }

      .text-slate-300 {
        color: rgba(61, 61, 61, 0.5) !important;
      }

      .text-blue-500, .text-blue-700, .text-purple-500, .text-sky-600, .text-rose-600 {
        color: #638C6D !important;
      }

      .bg-slate-50, .bg-slate-100, .bg-blue-50, .bg-purple-50, .bg-sky-50, .bg-rose-50 {
        background-color: #E7FBB4 !important;
      }

      .bg-blue-50, .bg-purple-50, .bg-sky-50, .bg-rose-50 {
        background-color: #E7FBB4 !important;
      }

      .bg-slate-200 {
        background-color: #E7FBB4 !important;
      }

      .border-slate-100, .border-slate-200 {
        border-color: #E7FBB4 !important;
      }

      .bg-slate-300, .bg-slate-400 {
        background-color: #E7FBB4 !important;
      }

      /* Refined entrance for the page */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.5s ease-out both; }

      /* Subtle gold underline that grows on hover — replaces the bouncy translate */
      .gold-underline {
        background-image: linear-gradient(currentColor, currentColor);
        background-size: 0 1.5px;
        background-position: 0 100%;
        background-repeat: no-repeat;
        transition: background-size 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gold-underline:hover { background-size: 100% 1.5px; }

      /* Geometric arabesque divider — used between sections */
      .arabesque-divider {
        height: 24px;
        background-image:
          radial-gradient(circle at 50% 0, transparent 8px, #e7fbb4 8px, #e7fbb4 9px, transparent 9px),
          radial-gradient(circle at 0   12px, #e7fbb4 1.5px, transparent 1.5px),
          radial-gradient(circle at 50% 12px, #e7fbb4 1.5px, transparent 1.5px),
          radial-gradient(circle at 100% 12px, #e7fbb4 1.5px, transparent 1.5px);
        background-size: 48px 24px, 48px 24px, 48px 24px, 48px 24px;
        background-repeat: repeat-x;
        opacity: 0.55;
      }
    </style>
  </head>
  <body class="font-sans text-[#3D3D3D]">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
