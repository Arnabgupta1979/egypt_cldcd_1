<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CASC Egypt — Central Administration for Seed Testing and Certification</title>

    <!-- 1. Load Tailwind CDN FIRST so the `tailwind` global exists -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. THEN extend the config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              /* ── Fresh Egyptian Seed Portal Palette ───────────────────────
                 Uses the attached green/yellow/orange palette for a cleaner,
                 warm civic identity across backgrounds, accents, and controls. */
              emerald: {
                50:  '#eef7e5',
                100: '#d9efc7',
                200: '#c3e4a0',
                300: '#abda79',
                400: '#8fd04a',
                500: '#73c525',
                600: '#5da61f',
                700: '#4a8a1b',
                800: '#3c7018',
                900: '#315913',
                950: '#26420f',
              },
              /* ── Sunlit Amber / Citrus Accent ──────────────────────────────
                 Aligns the highlight palette with the screenshot yellow/orange.
                 Light yellow is used for soft surfaces and orange for strong CTA accents. */
              amber: {
                50:  '#fff9e0',
                100: '#fff1b9',
                200: '#ffef91',
                300: '#ffdc66',
                400: '#ffa02e',
                500: '#ff8f13',
                600: '#dc7c10',
                700: '#ae620e',
                800: '#85470c',
                900: '#5f3309',
                950: '#3f2306',
              },
              parchment: {
                50:  '#fff7d8',  /* page background */
                100: '#fff0b9',  /* raised surface  */
                200: '#ffe58f',  /* subtle dividers */
                300: '#ffd76a',
                400: '#ffc24a',
              },
              /* Deep ink for body copy — softer than pure black */
              ink: {
                700: '#2a2620',
                800: '#1c1915',
                900: '#100e0b',
              },
            },
            fontFamily: {
              /* Body: Cairo (excellent Arabic + Latin support) */
              sans: ['Cairo', 'system-ui', 'sans-serif'],
              /* Display headings: Playfair Display for Latin, Amiri for Arabic.
                 Browser falls back automatically based on character set. */
              display: ['"Playfair Display"', 'Amiri', 'Cairo', 'serif'],
              /* For OFFICIAL stamp, eyebrow labels, small caps */
              stamp: ['"Cinzel"', '"Playfair Display"', 'serif'],
            },
            boxShadow: {
              /* Used on cards — soft warm shadow, not the flat black SaaS shadow */
              card: '0 1px 2px rgba(76, 60, 30, 0.04), 0 8px 24px -8px rgba(76, 60, 30, 0.08)',
              'card-hover': '0 4px 8px rgba(76, 60, 30, 0.06), 0 16px 40px -12px rgba(76, 60, 30, 0.18)',
              /* Inset hairline used on primary buttons for the "minted" feel */
              minted: 'inset 0 0 0 1px rgba(212, 167, 44, 0.5), 0 4px 12px -2px rgba(13, 46, 31, 0.25)',
            },
            backgroundImage: {
              /* Subtle papyrus fibre — generated from layered linear-gradients,
                 no external image needed. Almost invisible but warms the page. */
              'papyrus':
                'repeating-linear-gradient(115deg, rgba(212,167,44,0.018) 0 2px, transparent 2px 7px),' +
                'repeating-linear-gradient(25deg,  rgba(76,60,30,0.022) 0 1px, transparent 1px 5px)',
            },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Amiri:wght@400;700&family=Cinzel:wght@500;600;700&display=swap"
      rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', system-ui, sans-serif;
        background-color: #fff7d8;
        background-image:
          repeating-linear-gradient(115deg, rgba(255,160,46,0.06) 0 2px, transparent 2px 7px),
          repeating-linear-gradient(25deg,  rgba(70,132,50,0.02)  0 1px, transparent 1px 5px);
      }

      /* Display headings: serif for Latin, Amiri for Arabic */
      .font-display { font-family: 'Playfair Display', 'Amiri', 'Cairo', serif; }
      [dir="rtl"] .font-display { font-family: 'Amiri', 'Playfair Display', 'Cairo', serif; }

      /* Stamp typography for OFFICIAL badges and eyebrow labels */
      .font-stamp { font-family: 'Cinzel', 'Playfair Display', serif; letter-spacing: 0.18em; }

      /* Refined entrance for the page */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fade-in 0.5s ease-out both; }

      /* Subtle gold underline that grows on hover — replaces the bouncy translate */
      .gold-underline {
        background-image: linear-gradient(currentColor, currentColor);
        background-size: 0 1.5px;
        background-position: 0 100%;
        background-repeat: no-repeat;
        transition: background-size 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .gold-underline:hover { background-size: 100% 1.5px; }

      /* Geometric arabesque divider — used between sections */
      .arabesque-divider {
        height: 24px;
        background-image:
          radial-gradient(circle at 50% 0, transparent 8px, #ffa02e 8px, #ffa02e 9px, transparent 9px),
          radial-gradient(circle at 0   12px, #ffa02e 1.5px, transparent 1.5px),
          radial-gradient(circle at 50% 12px, #ffa02e 1.5px, transparent 1.5px),
          radial-gradient(circle at 100% 12px, #ffa02e 1.5px, transparent 1.5px);
        background-size: 48px 24px, 48px 24px, 48px 24px, 48px 24px;
        background-repeat: repeat-x;
        opacity: 0.55;
      }
    </style>
  </head>
  <body class="text-ink-800">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
